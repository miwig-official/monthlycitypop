<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTHLY CITY POP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --uv: #5F4B8B; /* Ultra Violet */
            --bg: #ffffff;
            --text-dark: #111111;
            --text-muted: #888888;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            word-break: keep-all;
        }

        /* 드롭다운 메뉴 */
        .dropdown-menu {
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
        }
        .dropdown.active .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* 앨범 커버 호버 효과 (부드러운 확대) */
        .cover-wrap {
            overflow: hidden;
            border-radius: 4px;
            background-color: #f5f5f5;
        }
        .cover-wrap img {
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .album-card:hover .cover-wrap img {
            transform: scale(1.04);
        }

        /* 텍스트 줄임 (말줄임표) */
        .truncate-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }

        /* 스크롤바 숨김 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 등장 애니메이션 */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="antialiased selection:bg-[#5F4B8B] selection:text-white">

    <!-- Global Header -->
    <header class="fixed top-0 left-0 w-full z-40 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-[1600px] mx-auto px-6 h-16 md:h-20 flex justify-between items-center">
            <h1 class="text-sm md:text-base font-black tracking-tighter uppercase">Monthly City Pop</h1>
            
            <!-- Archive Dropdown -->
            <div class="dropdown relative">
                <button onclick="toggleDropdown(event)" class="flex items-center gap-2 text-xs font-semibold uppercase tracking-widest hover:text-[var(--uv)] transition-colors">
                    <span id="nav-month">April 2026</span>
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div class="dropdown-menu absolute right-0 top-full mt-4 w-40 bg-white border border-gray-100 shadow-xl rounded-md overflow-hidden z-50">
                    <button onclick="loadMonth('2026.05')" class="w-full text-left px-5 py-3 text-xs font-semibold tracking-widest hover:bg-gray-50 transition-colors uppercase">May 2026</button>
                    <button onclick="loadMonth('2026.04')" class="w-full text-left px-5 py-3 text-xs font-semibold tracking-widest text-[var(--uv)] bg-gray-50 uppercase">Apr 2026</button>
                </div>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-32 max-w-[1600px] mx-auto px-6">
        
        <!-- Theme Header -->
        <section id="theme-section" class="mb-20 md:mb-32 animate-fade-up">
            <div class="max-w-4xl">
                <p id="theme-date" class="text-xs font-bold text-[var(--uv)] tracking-[0.2em] uppercase mb-4">Volume 04 / April 2026</p>
                <h2 id="theme-title" class="text-4xl md:text-7xl font-bold tracking-tight leading-tight mb-8">
                    Midnight Urban Drive
                </h2>
                <p id="theme-intro" class="text-lg md:text-xl text-gray-500 font-light leading-relaxed">
                    차가운 금속 질감의 신시사이저와 밤의 공기를 닮은 선율들. 도심의 불빛을 뒤로하고 달리는 드라이브의 동반자가 되어줄 10곡의 아카이브.
                </p>
            </div>
        </section>

        <!-- Albums Grid (Responsive: 2 cols on mobile, 5 on PC) -->
        <section class="animate-fade-up" style="animation-delay: 0.1s;">
            <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-x-4 gap-y-12 md:gap-x-8 md:gap-y-16">
                <!-- Data is injected here -->
            </div>
        </section>

    </main>

    <!-- Detail Modal -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8 hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-white/95 backdrop-blur-sm" onclick="closeModal()"></div>
        
        <!-- Modal Content -->
        <div class="relative w-full max-w-5xl bg-white rounded-xl shadow-2xl overflow-hidden flex flex-col md:flex-row h-full md:h-auto max-h-[90vh]">
            <!-- Close Button -->
            <button onclick="closeModal()" class="absolute top-4 right-4 md:top-6 md:right-6 w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 transition-colors z-10">
                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <!-- Cover Image -->
            <div class="w-full md:w-1/2 bg-gray-50 flex items-center justify-center p-8 md:p-16">
                <img id="modal-img" src="" alt="Album Cover" class="w-full aspect-square object-cover rounded-md shadow-lg">
            </div>
            
            <!-- Details -->
            <div class="w-full md:w-1/2 p-8 md:p-16 overflow-y-auto flex flex-col justify-center">
                <span class="inline-block px-3 py-1 bg-[#5F4B8B]/10 text-[var(--uv)] text-[10px] font-bold tracking-widest rounded-full uppercase mb-6 w-max">Track Details</span>
                
                <h3 id="modal-title" class="text-3xl md:text-5xl font-bold tracking-tight mb-2">Album Title</h3>
                <p id="modal-artist" class="text-lg md:text-xl text-gray-500 font-medium mb-8">Artist Name</p>
                
                <p id="modal-desc" class="text-gray-600 leading-relaxed font-light mb-12 text-sm md:text-base">
                    앨범에 대한 상세 설명이 들어갑니다.
                </p>
                
                <div class="flex flex-wrap gap-4 mt-auto">
                    <a id="modal-link-listen" href="#" target="_blank" class="px-6 py-3 bg-[var(--uv)] text-white text-xs font-bold uppercase tracking-widest rounded-md hover:bg-[#4a3a6e] transition-colors">Listen</a>
                    <a id="modal-link-ref" href="#" target="_blank" class="px-6 py-3 bg-gray-100 text-gray-700 text-xs font-bold uppercase tracking-widest rounded-md hover:bg-gray-200 transition-colors">Reference</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-12 border-t border-gray-100">
        <div class="max-w-[1600px] mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-[10px] font-bold tracking-widest text-gray-400 uppercase">© Monthly City Pop Archive</p>
            <div class="flex gap-6 text-[10px] font-bold tracking-widest uppercase text-gray-400">
                <a href="#" class="hover:text-[var(--uv)] transition-colors">Instagram</a>
                <a href="#" class="hover:text-[var(--uv)] transition-colors">Spotify</a>
            </div>
        </div>
    </footer>

    <script>
        // Database Mock (JSON format)
        const db = {
            "2026.04": {
                theme: "Midnight Urban Drive",
                intro: "차가운 금속 질감의 신시사이저와 밤의 공기를 닮은 선율들. 도심의 불빛을 뒤로하고 달리는 드라이브의 동반자가 되어줄 10곡의 아카이브.",
                albums: [
                    { title: "Pacific Breeze", artist: "Various Artists", img: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=1000", desc: "시티팝 컴필레이션의 정석. 70~80년대 일본의 번영과 도시적인 감성이 완벽하게 녹아들어 있습니다." },
                    { title: "Sunshower", artist: "Taeko Onuki", img: "https://images.unsplash.com/photo-1514525253344-f814d0c9e48d?q=80&w=1000", desc: "타에코 오누키의 명반입니다. 세련된 편곡과 몽환적인 보컬이 일품이며 시티팝의 고전으로 평가받습니다." },
                    { title: "After 5 Clash", artist: "Toshiki Kadomatsu", img: "https://images.unsplash.com/photo-1459749411177-042180ce673c?q=80&w=1000", desc: "퇴근 후의 도시 야경이 떠오르는 앨범입니다. 펑키한 베이스 라인과 화려한 브라스 세션이 돋보입니다." },
                    { title: "Timely!!", artist: "Anri", img: "https://images.unsplash.com/photo-1493225255756-d9584f8606e9?q=80&w=1000", desc: "여름, 바다, 그리고 질주하는 자동차. 안리의 시원한 목소리가 여름 시티팝의 정수를 보여줍니다." },
                    { title: "Adventure", artist: "Momoko Kikuchi", img: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=1000", desc: "몽환적인 신시사이저 사운드와 모모코 키쿠치의 부드러운 음색이 어우러진 명작입니다." },
                    { title: "Magical", artist: "Junko Ohashi", img: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=1000", desc: "준코 오하시의 폭발적인 가창력과 세련된 어반 사운드가 조화를 이루는 명반입니다." },
                    { title: "First Light", artist: "Akira Terao", img: "https://images.unsplash.com/photo-1420133965216-7ca77d2466e4?q=80&w=1000", desc: "중후한 매력이 돋보이는 앨범입니다. 차분하면서도 세련된 연주가 특징입니다." },
                    { title: "Love Trip", artist: "Takako Mamiya", img: "https://images.unsplash.com/photo-1496293455970-f8581aae0e3c?q=80&w=1000", desc: "마미야 타카코의 유일한 명반. 시티팝 매니아라면 반드시 소장해야 할 아이템입니다." },
                    { title: "Variety", artist: "Mariya Takeuchi", img: "https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?q=80&w=1000", desc: "전설적인 'Plastic Love'가 수록된 앨범입니다. 타케우치 마리야의 세련된 감각이 돋보입니다." },
                    { title: "Ride on Time", artist: "Tatsuro Yamashita", img: "https://images.unsplash.com/photo-1516280440614-37939bbacd81?q=80&w=1000", desc: "시티팝의 왕 야마시타 타츠로의 대표작. 완벽한 프로듀싱의 정점을 보여줍니다." }
                ]
            },
            "2026.05": {
                theme: "Sunset Memories",
                intro: "해 질 녘의 나른함과 보랏빛 공기를 담은 플레이리스트. 하루를 마무리하는 시간에 어울리는 10장의 레코드.",
                albums: [
                    { title: "Summer Breeze", artist: "Piper", img: "https://images.unsplash.com/photo-1619983081563-430f63602796?q=80&w=1000", desc: "5월 큐레이션 데이터 예시입니다." },
                    { title: "Aqua City", artist: "Kiyotaka Sugiyama", img: "https://images.unsplash.com/photo-1459749411177-042180ce673c?q=80&w=1000", desc: "청량한 바닷바람이 느껴지는 사운드." }
                ]
            }
        };

        const grid = document.getElementById('grid-container');
        const modal = document.getElementById('modal');
        const dropdown = document.querySelector('.dropdown');

        // 드롭다운 토글 (모바일에서도 잘 작동하도록 click 이벤트 사용)
        function toggleDropdown(e) {
            e.stopPropagation();
            dropdown.classList.toggle('active');
        }

        // 바탕 클릭 시 드롭다운 닫기
        document.addEventListener('click', (e) => {
            if (!dropdown.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        });

        // 데이터 렌더링
        function loadMonth(monthKey) {
            dropdown.classList.remove('active');
            const data = db[monthKey];
            if(!data) return;

            // Update UI Texts
            document.getElementById('nav-month').innerText = monthKey === '2026.04' ? 'April 2026' : 'May 2026';
            document.getElementById('theme-date').innerText = `Volume ${monthKey.split('.')[1]} / ${monthKey === '2026.04' ? 'April' : 'May'} 2026`;
            document.getElementById('theme-title').innerText = data.theme;
            document.getElementById('theme-intro').innerText = data.intro;

            // Render Grid
            grid.innerHTML = '';
            data.albums.forEach((album) => {
                const card = document.createElement('article');
                card.className = 'album-card cursor-pointer group';
                card.onclick = () => openModal(album);
                
                // 심플하고 모던한 카드 구조
                card.innerHTML = `
                    <div class="cover-wrap mb-4">
                        <img src="${album.img}" alt="${album.title}" class="w-full h-full object-cover aspect-square">
                    </div>
                    <div>
                        <h3 class="font-bold text-sm md:text-base text-gray-900 truncate group-hover:text-[var(--uv)] transition-colors">${album.title}</h3>
                        <p class="text-xs text-gray-500 mt-1">${album.artist}</p>
                    </div>
                `;
                grid.appendChild(card);
            });

            // 화면 최상단으로 이동 애니메이션
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openModal(album) {
            document.getElementById('modal-img').src = album.img;
            document.getElementById('modal-title').innerText = album.title;
            document.getElementById('modal-artist').innerText = album.artist;
            document.getElementById('modal-desc').innerText = album.desc;
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // 배경 스크롤 방지
        }

        function closeModal() {
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto'; // 배경 스크롤 복구
        }

        // 초기 로드
        window.onload = () => loadMonth('2026.04');
    </script>
</body>
</html>
