<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monthly City Pop | Archive</title>
  <meta name="description" content="매달 10장의 시티팝 명반을 큐레이션해 소개하는 독립 아카이브 프로젝트.">
  <meta property="og:title" content="Monthly City Pop">
  <meta property="og:description" content="Curated Sound Archive — 시티팝 월간 아카이브">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://miwig-official.github.io/monthlycitypop/logo.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap">

  <style>
    :root {
      --uv: #5F4B8B;
      --bg: #ffffff;
      --ink: #111111;
      --line: #F3F4F6;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .font-mono { font-family: 'Space Mono', monospace; }
    .font-logo { font-family: 'Syne', sans-serif; }

    .dropdown-menu {
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--bg);
      border: 1px solid #eee;
      border-radius: 12px;
      min-width: 180px;
      z-index: 50;
      box-shadow: 0 15px 30px rgba(0,0,0,0.06);
      transition: opacity .25s, transform .25s, visibility .25s;
    }
    .dropdown.active .dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .album-card .cover-box {
      background: #f8f8f8;
      border: 1px solid #eee;
      overflow: hidden;
      transition: transform .5s cubic-bezier(.2,.8,.2,1), box-shadow .3s, border-color .3s;
    }
    @media (hover: hover) {
      .album-card:hover .cover-box {
        transform: translateY(-6px);
        box-shadow: 0 12px 20px rgba(0,0,0,0.08);
        border-color: var(--ink);
      }
      .album-card:hover .album-title { color: var(--uv); }
    }

    #theme-title {
      font-size: clamp(1.8rem, 8vw, 3.2rem);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--ink);
      word-break: keep-all;
    }

    .ticker-wrap {
      width: 100%;
      overflow: hidden;
      background: var(--ink);
      display: flex;
      align-items: center;
      height: 36px;
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .animate-marquee {
      display: inline-flex;
      align-items: center;
      gap: 0;
      white-space: nowrap;
      animation: marquee 45s linear infinite;
      will-change: transform;
    }
    .marquee-text {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.5);
      line-height: 1;
      display: inline-flex;
      align-items: center;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .modal.open { display: flex; animation: fadeIn .35s ease forwards; }
    .modal-content {
      max-width: 600px;
      width: 100%;
      text-align: center;
      animation: slideUp .5s cubic-bezier(.16,1,.3,1) forwards;
    }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) }
      to { opacity: 1; transform: translateY(0) }
    }

    /* 긴 서술형 필드 — 줄바꿈 허용 */
    #theme-title,
    #theme-intro,
    #modal-title,
    #modal-artist,
    #modal-desc,
    #modal-pick-track,
    #modal-pick-note {
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* 앨범 카드 텍스트 — 한 줄 말줄임 (가변성 통제) */
    .album-title,
    .album-artist,
    .album-year {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .footer-logo { height: 18px; width: auto; object-fit: contain; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .album-card { animation: cardIn .4s ease both; }

    .uv-dot { color: var(--uv); }
    .focus-ring:focus-visible {
      outline: 2px solid var(--uv);
      outline-offset: 2px;
      border-radius: 4px;
    }
  </style>

</head>
<body class="selection:bg-black selection:text-white overflow-x-hidden">

  <!-- ─── MODAL ─── -->

  <div id="note-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-content px-4 relative">
      <button type="button" class="modal-close absolute -top-2 right-0 md:top-0 md:right-0 text-black focus-ring" aria-label="Close">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <p id="modal-artist" class="font-mono text-[10px] text-gray-400 uppercase tracking-[0.3em] mb-4"></p>
      <h2 id="modal-title" class="text-3xl md:text-5xl font-black uppercase tracking-tighter mb-3 leading-none"></h2>
      <p id="modal-year" class="font-mono text-xs font-black text-[var(--uv)] tracking-[0.3em] mb-8 md:mb-10"></p>
      <div class="w-12 h-px bg-black/10 mx-auto mb-8"></div>
      <div class="max-h-[50vh] overflow-y-auto px-2">
        <!-- Editor's Pick block -->
        <div id="modal-pick" class="hidden mb-8 p-5 md:p-6 border border-[var(--uv)]/25 rounded-xl bg-[var(--uv)]/5 text-left max-w-md mx-auto">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1.5 h-1.5 rounded-full bg-[var(--uv)]"></span>
            <span class="font-mono text-[9px] font-black tracking-[0.3em] uppercase text-[var(--uv)]">Editor's Pick</span>
          </div>
          <p id="modal-pick-track" class="text-lg md:text-xl font-black tracking-tight mb-3 leading-tight text-black"></p>
          <p id="modal-pick-note" class="text-sm leading-relaxed text-gray-600 font-medium"></p>
        </div>
        <p id="modal-desc" class="text-base text-gray-600 leading-relaxed font-medium max-w-md mx-auto text-left md:text-center"></p>
      </div>
      <button type="button" class="modal-close mt-12 md:mt-16 font-mono text-[10px] font-black tracking-widest uppercase border-b border-black pb-1 focus-ring">Close Window</button>
    </div>
  </div>

  <!-- ─── HEADER ─── -->

  <header class="w-full bg-white/90 backdrop-blur-md border-b border-gray-100 sticky top-0 z-40">
    <div class="max-w-[1400px] mx-auto flex items-center justify-between min-h-[70px] md:h-14 px-4 md:px-6 py-2 md:py-0">
      <div class="flex items-center min-w-0">
        <h1 class="font-logo text-[1.1rem] sm:text-xl md:text-2xl uppercase tracking-tighter leading-[0.95] pt-0.5 flex flex-col sm:flex-row">
          <span>Monthly</span>
          <span class="sm:ml-2">City Pop<span class="uv-dot">.</span></span>
        </h1>
        <div class="hidden md:block w-px h-3 bg-gray-200 mx-4"></div>
        <div class="hidden lg:block font-mono text-[9px] text-gray-400 uppercase tracking-[0.2em]">Curated Archive</div>
      </div>

  <div class="dropdown relative shrink-0 ml-4" id="dropdown-toggle">
    <button type="button" class="dropdown-btn flex items-center gap-2 px-3 py-1.5 md:py-2 rounded-full border border-gray-100 bg-gray-50 hover:bg-white transition-all shadow-sm focus-ring">
      <div class="w-1.5 h-1.5 rounded-full bg-black"></div>
      <span id="nav-month" class="font-mono text-[9px] font-black uppercase tracking-widest text-gray-800 pt-0.5">---</span>
      <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
    </button>
    <div id="month-list" class="dropdown-menu mt-2 p-2" role="menu"></div>
  </div>
</div>

  </header>

  <main class="max-w-[1400px] mx-auto w-full">

<!-- ─── HERO ─── -->
<section class="relative bg-white overflow-hidden border-y border-black">
  <div id="theme-watermark" class="absolute right-0 bottom-0 text-[10rem] md:text-[18rem] lg:text-[24rem] font-black text-gray-50 leading-none select-none z-0 tracking-tighter pointer-events-none translate-y-1/4 translate-x-1/4" aria-hidden="true">--</div>

  <div class="grid md:grid-cols-12 relative z-10 items-stretch">

    <!-- ✦ Image column — FIXED mobile cover sizing ✦ -->
    <div class="md:col-span-4 lg:col-span-3 py-8 px-6 md:p-8 flex items-center justify-center bg-gray-50/60 md:bg-gray-50/50 border-b md:border-b-0 md:border-r border-black">
      <!--
        모바일: 180px 고정 정사각형
        태블릿+: 240px
        데스크톱+: 280px
        aspect-square + 명시적 w-[..]로 부모 flex가 늘리지 못하게 고정
      -->
      <div class="relative aspect-square overflow-hidden bg-gray-100 rounded-sm w-[180px] sm:w-[220px] md:w-[240px] lg:w-[280px] shrink-0 md:shadow-[0_25px_50px_-12px_rgba(0,0,0,0.25)]">
        <img
          id="theme-img"
          alt="Theme Cover"
          src="https://images.unsplash.com/photo-1571677422251-713bf27d7920?w=800"
          class="absolute inset-0 w-full h-full object-cover grayscale-[5%] md:hover:grayscale-0 transition-all duration-700"
          loading="eager"
          decoding="async">
      </div>
    </div>

    <!-- Text column -->
    <div class="md:col-span-8 lg:col-span-9 flex flex-col justify-center min-w-0">
      <div class="px-6 py-10 md:px-12 relative z-20">
        <div class="flex items-center gap-3 mb-6">
          <span class="w-10 h-[2px] bg-[var(--uv)]"></span>
          <span id="theme-vol-label" class="font-mono text-[10px] md:text-[11px] font-black text-black uppercase tracking-[0.3em]">---</span>
        </div>
        <h2 id="theme-title" class="mb-6 max-w-4xl"></h2>
        <p id="theme-intro" class="text-sm md:text-base text-gray-500 leading-relaxed font-medium italic border-l-[3px] border-[var(--uv)] pl-5 max-w-xl"></p>
      </div>
      <div class="mt-auto ticker-wrap" aria-hidden="true">
        <div class="animate-marquee">
          <span class="marquee-text">MONTHLY CITY POP &nbsp;✦&nbsp; A CURATED SOUND ARCHIVE &nbsp;✦&nbsp; EST. 2026 &nbsp;✦&nbsp;&nbsp;</span>
          <span class="marquee-text">MONTHLY CITY POP &nbsp;✦&nbsp; A CURATED SOUND ARCHIVE &nbsp;✦&nbsp; EST. 2026 &nbsp;✦&nbsp;&nbsp;</span>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ─── COLLECTION ─── -->
<section class="p-6 md:p-10 lg:p-14 bg-white">
  <div class="mb-10 md:mb-14 flex items-end justify-between">
    <h3 class="font-logo text-lg md:text-xl font-black uppercase tracking-tighter text-black leading-none">Collection</h3>
    <div class="flex-1 h-px bg-gray-100 ml-8 md:ml-12 hidden sm:block mb-1"></div>
  </div>
  <div id="grid-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-x-6 md:gap-x-10 gap-y-12 md:gap-y-16 items-start"></div>
</section>

  </main>

  <!-- ─── FOOTER ─── -->

  <footer class="bg-white py-8 border-t border-gray-100 text-center flex flex-col items-center gap-2.5">
    <img src="https://miwig-official.github.io/monthlycitypop/logo.jpg" alt="MCP Logo" class="footer-logo" loading="lazy">
    <div class="flex flex-col items-center gap-1">
      <p class="font-mono text-[9px] font-black uppercase tracking-[0.3em] text-black">Midnight with Groove Archive Project</p>
      <p class="font-mono text-[8px] font-bold uppercase tracking-[0.1em] text-gray-300">© 2026. All rights reserved.</p>
    </div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDXMTDaE76mqn6S6w2F5s4qHhdFphNULg8",
      authDomain: "monthly-city-pop.firebaseapp.com",
      projectId: "monthly-city-pop",
      storageBucket: "monthly-city-pop.firebasestorage.app",
      messagingSenderId: "860318834352",
      appId: "1:860318834352:web:f1b4d1c3212a41a9dde575"
    };
    const APP_ID = 'monthly-city-pop';
    const FALLBACK_IMG = 'https://images.unsplash.com/photo-1571677422251-713bf27d7920?w=800';
    const PLACEHOLDER_IMG = 'https://via.placeholder.com/500?text=No+Cover';

    const state = { archive: {}, currentMonth: '' };

    const mockData = {
      "2026.04": {
        theme: "LOADING ARCHIVE…",
        themeImg: FALLBACK_IMG,
        intro: "아카이브 시스템과 동기화 중입니다.\n잠시만 기다려주세요.",
        albums: [{ title: "System Ready", artist: "MCP", year: "2026", img: "", desc: "데이터 로드 대기 중…" }]
      }
    };

    const $ = (id) => document.getElementById(id);
    const refs = {
      navMonth: $('nav-month'),
      volLabel: $('theme-vol-label'),
      watermark: $('theme-watermark'),
      intro: $('theme-intro'),
      title: $('theme-title'),
      img: $('theme-img'),
      grid: $('grid-container'),
      monthList: $('month-list'),
      dropdown: $('dropdown-toggle'),
      modal: $('note-modal'),
      modalTitle: $('modal-title'),
      modalArtist: $('modal-artist'),
      modalYear: $('modal-year'),
      modalDesc: $('modal-desc'),
      modalPick: $('modal-pick'),
      modalPickTrack: $('modal-pick-track'),
      modalPickNote: $('modal-pick-note'),
    };

    // Image error fallback
    refs.img.addEventListener('error', () => {
      if (refs.img.src !== FALLBACK_IMG) refs.img.src = FALLBACK_IMG;
    });

    const renderMonth = (month) => {
      const data = state.archive[month];
      if (!data) return;

      const issueNo = month.split('.')[1] || '--';

      refs.navMonth.textContent = month;
      refs.volLabel.textContent = `VOL. ${month.replace('.', '/')}`;
      refs.watermark.textContent = issueNo;
      refs.intro.textContent = data.intro || '';
      refs.title.textContent = data.theme || '';
      refs.img.src = data.themeImg || FALLBACK_IMG;

      const frag = document.createDocumentFragment();
      (data.albums || []).forEach((album, idx) => {
        const card = document.createElement('div');
        card.className = 'album-card group flex flex-col';
        card.style.animationDelay = `${Math.min(idx * 40, 400)}ms`;

        const num = String(idx + 1).padStart(2, '0');

        // Cover button
        const coverBtn = document.createElement('button');
        coverBtn.type = 'button';
        coverBtn.className = 'modal-trigger cover-box w-full aspect-square mb-5 md:mb-6 relative rounded-sm focus-ring';
        coverBtn.dataset.idx = idx;
        coverBtn.setAttribute('aria-label', `${album.title || ''} — liner notes`);

        const numBadge = document.createElement('span');
        numBadge.className = 'absolute top-3 left-3 md:top-4 md:left-4 bg-black text-white font-mono text-[9px] font-black px-1.5 md:px-2 py-0.5 z-10 tracking-widest uppercase';
        numBadge.textContent = `#${num}`;

        const img = document.createElement('img');
        img.src = album.img || PLACEHOLDER_IMG;
        img.alt = album.title || '';
        img.className = 'w-full h-full object-cover grayscale-[5%] group-hover:grayscale-0 transition-all duration-700';
        img.loading = 'lazy';
        img.decoding = 'async';
        img.addEventListener('error', () => {
          if (img.src !== PLACEHOLDER_IMG) img.src = PLACEHOLDER_IMG;
        });

        coverBtn.append(numBadge, img);

        // Info block
        const info = document.createElement('div');
        info.className = 'flex-1 flex flex-col';

        const year = document.createElement('p');
        year.className = 'album-year font-mono text-[10px] md:text-xs text-gray-400 font-bold tracking-[0.2em] mb-2';
        year.textContent = album.year ? String(album.year).slice(0, 4) : '';

        const title = document.createElement('h3');
        title.className = 'album-title font-black text-sm md:text-base uppercase tracking-tight text-black mb-1 leading-tight transition-colors';
        title.textContent = album.title || '';

        const artist = document.createElement('p');
        artist.className = 'album-artist font-mono text-xs md:text-sm text-gray-400 font-bold uppercase tracking-widest leading-tight';
        artist.textContent = album.artist || '';

        const notesBtn = document.createElement('button');
        notesBtn.type = 'button';
        notesBtn.className = 'modal-trigger w-fit font-mono text-[10px] md:text-[11px] font-black text-black/40 hover:text-black tracking-[0.2em] uppercase transition-all flex items-center gap-2 focus-ring mt-4';
        notesBtn.dataset.idx = idx;
        notesBtn.innerHTML = '<span class="w-4 h-px bg-black/20"></span>Liner Notes';

        info.append(year, title, artist, notesBtn);
        card.append(coverBtn, info);
        frag.appendChild(card);
      });
      refs.grid.replaceChildren(frag);
    };

    // (PLACEHOLDER_IMG is referenced directly — no global leak needed)

    const renderSelector = () => {
      const months = Object.keys(state.archive).sort().reverse();
      const frag = document.createDocumentFragment();
      months.forEach((m) => {
        const btn = document.createElement('button');
        const isActive = m === state.currentMonth;
        btn.type = 'button';
        btn.className = `month-btn w-full text-left px-4 py-3 font-mono text-[10px] font-black tracking-widest uppercase rounded-lg mb-1 flex justify-between items-center transition-all focus-ring ${
          isActive ? 'bg-black text-white shadow-xl shadow-black/20' : 'hover:bg-gray-50 text-gray-400 hover:text-black'
        }`;
        btn.dataset.month = m;
        btn.textContent = m;
        frag.appendChild(btn);
      });
      refs.monthList.replaceChildren(frag);
    };

    const openModal = (album) => {
      refs.modalTitle.textContent = album.title || 'UNTITLED';
      refs.modalArtist.textContent = album.artist || 'UNKNOWN';
      refs.modalYear.textContent = album.year ? `— ${String(album.year).slice(0, 4)} —` : '';
      refs.modalDesc.textContent = album.desc || 'No liner notes available.';

      // Editor's Pick block — show only if either field has content
      const hasPick = (album.pickTrack && album.pickTrack.trim()) || (album.pickNote && album.pickNote.trim());
      if (hasPick) {
        refs.modalPickTrack.textContent = album.pickTrack ? `▸ ${album.pickTrack}` : '';
        refs.modalPickNote.textContent = album.pickNote || '';
        refs.modalPickTrack.style.display = album.pickTrack ? '' : 'none';
        refs.modalPickNote.style.display = album.pickNote ? '' : 'none';
        refs.modalPick.classList.remove('hidden');
      } else {
        refs.modalPick.classList.add('hidden');
      }

      refs.modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    };
    const closeModal = () => {
      refs.modal.classList.remove('open');
      document.body.style.overflow = '';
    };
    const toggleDropdown = (force) => {
      refs.dropdown.classList.toggle('active', force);
    };

    document.addEventListener('click', (e) => {
      const dropdownBtn = e.target.closest('.dropdown-btn');
      if (dropdownBtn) { e.stopPropagation(); toggleDropdown(); return; }
      const monthBtn = e.target.closest('.month-btn');
      if (monthBtn) {
        e.stopPropagation();
        const m = monthBtn.dataset.month;
        if (m && state.archive[m]) {
          state.currentMonth = m;
          renderMonth(m);
          renderSelector();
          toggleDropdown(false);
        }
        return;
      }
      const trigger = e.target.closest('.modal-trigger');
      if (trigger) {
        const idx = Number(trigger.dataset.idx);
        const album = state.archive[state.currentMonth]?.albums?.[idx];
        if (album) openModal(album);
        return;
      }
      if (e.target.closest('.modal-close')) { closeModal(); return; }
      if (e.target === refs.modal) { closeModal(); return; }
      if (!e.target.closest('#dropdown-toggle')) { toggleDropdown(false); }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (refs.modal.classList.contains('open')) closeModal();
      else toggleDropdown(false);
    });

    const init = async () => {
      state.archive = mockData;
      state.currentMonth = Object.keys(state.archive)[0];
      renderMonth(state.currentMonth);
      renderSelector();

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          try { await signInWithCustomToken(auth, __initial_auth_token); }
          catch { await signInAnonymously(auth); }
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        console.error('Auth error:', err);
        return;
      }

      onAuthStateChanged(auth, (user) => {
        if (!user) return;
        onSnapshot(
          doc(db, 'artifacts', APP_ID, 'public', 'data', 'archive', 'master'),
          (snap) => {
            const incoming = snap.exists() ? snap.data() : null;
            state.archive = (incoming && Object.keys(incoming).length) ? incoming : mockData;
            const keys = Object.keys(state.archive).sort().reverse();
            if (!state.archive[state.currentMonth]) state.currentMonth = keys[0] || '';
            if (state.currentMonth) {
              renderMonth(state.currentMonth);
              renderSelector();
            }
          },
          (err) => console.error('Firestore error:', err)
        );
      });
    };

    init();
  </script>

</body>
</html>
