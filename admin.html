<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP | 관리자 전용 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Unified Input Styling */
        .input-group { 
            display: flex; 
            align-items: center; 
            background: #ffffff; 
            border: 1px solid #e2e8f0; 
            border-radius: 0.75rem; 
            overflow: hidden;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-group:focus-within { 
            border-color: #5F4B8B; 
            box-shadow: 0 0 0 3px rgba(95, 75, 139, 0.1); 
        }
        .input-field-bare { 
            flex: 1; 
            padding: 0.75rem 1rem; 
            font-size: 0.875rem; 
            outline: none;
            background: transparent;
        }

        .file-upload-trigger {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            margin: 0.25rem;
            background: #5F4B8B;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .file-upload-trigger:hover { background: #4a3a6e; transform: translateY(-1px); }

        /* Card & Layout */
        .card { 
            background: white; 
            border-radius: 1.25rem; 
            padding: 2rem; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.02);
            margin-bottom: 1.5rem;
        }
        .btn-main { 
            background: #1e293b; 
            color: white; 
            padding: 0.75rem 1.5rem; 
            border-radius: 0.75rem; 
            font-weight: 800; 
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .btn-main:hover { background: #0f172a; transform: translateY(-2px); }
        
        .btn-save {
            background: #5F4B8B;
            color: white;
            font-weight: 900;
            padding: 0.75rem 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 10px 20px rgba(95, 75, 139, 0.2);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-save:hover { transform: scale(1.05); background: #4a3a6e; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        
        /* Admin Logo Styling */
        .admin-brand-logo { width: 44px; height: 44px; border-radius: 12px; object-fit: cover; }
    </style>
</head>
<body class="selection:bg-[#5F4B8B] selection:text-white antialiased">

    <div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-[3px] border-slate-100 border-t-[#5F4B8B] rounded-full animate-spin"></div>
            <p class="mt-6 font-mono text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">System Initializing...</p>
        </div>
    </div>

    <div class="max-w-5xl mx-auto min-h-screen flex flex-col">
        <header class="flex items-center justify-between pt-12 pb-10 px-4">
            <div class="flex items-center gap-5">
                <img src="https://miwig-official.github.io/monthlycitypop/logo.jpg" alt="MCP Logo" class="admin-brand-logo shadow-lg shadow-black/5">
                <div>
                    <div class="flex items-center gap-2 mb-0.5">
                        <span class="status-dot bg-slate-300" id="auth-dot"></span>
                        <span id="auth-status" class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-400 pt-0.5">Disconnected</span>
                    </div>
                    <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase leading-none">Management Center</h1>
                </div>
            </div>
            <button id="save-btn" class="btn-save flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                저장하기
            </button>
        </header>

        <div class="grid md:grid-cols-12 gap-8 flex-1 pb-20">
            <!-- Sidebar -->
            <div class="md:col-span-4 lg:col-span-3 px-4">
                <div class="sticky top-8">
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                        <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Archive Index</h2>
                        <div id="month-list" class="space-y-1.5 mb-6"></div>
                        <button id="add-month-btn" class="group w-full py-4 rounded-xl border-2 border-dashed border-slate-200 text-slate-300 hover:border-[#5F4B8B] hover:text-[#5F4B8B] transition-all flex flex-col items-center justify-center gap-1">
                            <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                            <span class="text-[10px] font-black uppercase">Add Volume</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Editor -->
            <div class="md:col-span-8 lg:col-span-9 px-4">
                <div id="editor-container" class="hidden space-y-6">
                    <div class="card animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div class="flex items-center gap-3 mb-8">
                            <div class="w-1 h-6 bg-[#5F4B8B] rounded-full"></div>
                            <h2 class="text-lg font-black text-slate-900 tracking-tight uppercase pt-0.5">Primary Theme</h2>
                        </div>
                        <div class="space-y-6">
                            <div class="group">
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest group-focus-within:text-[#5F4B8B] transition-colors">Theme Concept Title</label>
                                <!-- Multi-line support for Title -->
                                <textarea id="theme-title" class="input-field w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-bold focus:border-[#5F4B8B] focus:ring-4 focus:ring-[#5F4B8B]/5 transition-all outline-none min-h-[60px]" placeholder="예: Midnight Urban Drive" oninput="updateThemeData('theme', this.value)"></textarea>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Master Cover Image</label>
                                <div class="input-group">
                                    <input type="text" id="theme-img" class="input-field-bare font-mono text-xs text-slate-500" placeholder="URL 입력 또는 파일 업로드" oninput="updateThemeData('themeImg', this.value)">
                                    <label class="file-upload-trigger">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                        UPLOAD
                                        <input type="file" class="hidden" accept="image/*" onchange="handleFileAsBase64(this, 'theme-img', 'themeImg')">
                                    </label>
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Introduction Passage</label>
                                <textarea id="theme-intro" class="input-field w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-medium min-h-[120px] focus:border-[#5F4B8B] outline-none transition-all leading-relaxed" placeholder="테마 설명을 입력하세요." oninput="updateThemeData('intro', this.value)"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="card animate-in fade-in slide-in-from-bottom-6 duration-700">
                        <div class="flex items-center justify-between mb-10">
                            <div class="flex items-center gap-3">
                                <div class="w-1 h-6 bg-[#5F4B8B] rounded-full"></div>
                                <h2 class="text-lg font-black text-slate-900 tracking-tight uppercase pt-0.5">Curation Catalog</h2>
                            </div>
                            <button id="add-track-btn" class="btn-main flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                                ADD TRACK
                            </button>
                        </div>
                        <div id="tracks-container" class="space-y-10"></div>
                    </div>
                </div>
                <div id="no-selection" class="card flex flex-col items-center justify-center py-40 text-slate-300 text-center">
                    <p class="font-black tracking-widest text-[10px] uppercase px-6">Select a volume to start editing</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXMTDaE76mqn6S6w2F5s4qHhdFphNULg8",
            authDomain: "monthly-city-pop.firebaseapp.com",
            projectId: "monthly-city-pop",
            storageBucket: "monthly-city-pop.firebasestorage.app",
            messagingSenderId: "860318834352",
            appId: "1:860318834352:web:f1b4d1c3212a41a9dde575"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'monthly-city-pop';
        let archiveData = {}; let selectedMonth = "";

        const init = async () => {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    document.getElementById('auth-dot').className = "status-dot bg-green-500 animate-pulse";
                    document.getElementById('auth-status').innerText = "Connected";
                    document.getElementById('auth-status').classList.replace('text-slate-400', 'text-green-600');
                    await loadData();
                } else document.getElementById('loading-overlay').style.display = 'none';
            });
        };

        const loadData = async () => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'archive', 'master');
            const snap = await getDoc(docRef);
            archiveData = snap.exists() ? snap.data() : { "2026.04": { theme: "New Theme", themeImg: "", intro: "", albums: [] } };
            renderSidebar();
            document.getElementById('loading-overlay').style.display = 'none';
        };

        const renderSidebar = () => {
            const container = document.getElementById('month-list'); container.innerHTML = '';
            Object.keys(archiveData).sort().reverse().forEach(m => {
                const btn = document.createElement('button');
                const active = m === selectedMonth;
                btn.className = `w-full text-left px-5 py-4 rounded-xl text-xs font-black transition-all ${active ? 'bg-[#5F4B8B] text-white shadow-xl shadow-[#5F4B8B]/20 scale-[1.02]' : 'bg-transparent text-slate-500 hover:bg-slate-50 hover:text-slate-900'}`;
                btn.innerText = m; btn.onclick = () => selectMonth(m);
                container.appendChild(btn);
            });
        };

        const selectMonth = (month) => {
            selectedMonth = month;
            document.getElementById('editor-container').classList.remove('hidden');
            document.getElementById('no-selection').classList.add('hidden');
            const data = archiveData[month];
            document.getElementById('theme-title').value = data.theme || "";
            document.getElementById('theme-img').value = data.themeImg || "";
            document.getElementById('theme-intro').value = data.intro || "";
            renderTracks(data.albums || []);
            renderSidebar();
        };

        const renderTracks = (albums) => {
            const container = document.getElementById('tracks-container'); container.innerHTML = '';
            albums.forEach((album, idx) => {
                const div = document.createElement('div'); 
                div.className = 'group p-8 border border-slate-100 rounded-3xl relative bg-white hover:border-[#5F4B8B]/30 hover:shadow-2xl transition-all duration-300';
                div.innerHTML = `
                    <div class="absolute top-8 left-8 text-[10px] font-black text-[#5F4B8B] tracking-widest flex items-center gap-2 uppercase">
                        <span class="w-4 h-[2px] bg-[#5F4B8B]"></span> TRACK ${String(idx+1).padStart(2,'0')}
                    </div>
                    <button onclick="removeTrack(${idx})" class="absolute top-8 right-8 text-slate-200 hover:text-red-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-6 mt-10">
                        <div>
                            <label class="block text-[9px] font-black text-slate-400 uppercase mb-2 tracking-widest">Album Title</label>
                            <textarea oninput="updateTrackData(${idx}, 'title', this.value)" class="input-field w-full p-3 bg-slate-50 border border-slate-100 rounded-xl font-bold focus:border-[#5F4B8B] outline-none transition-all min-h-[46px] resize-none">${album.title || ''}</textarea>
                        </div>
                        <div>
                            <label class="block text-[9px] font-black text-slate-400 uppercase mb-2 tracking-widest">Artist Name</label>
                            <input type="text" value="${album.artist || ''}" oninput="updateTrackData(${idx}, 'artist', this.value)" class="input-field w-full p-3 bg-slate-50 border border-slate-100 rounded-xl font-bold focus:border-[#5F4B8B] outline-none transition-all" placeholder="Artist">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-[9px] font-black text-slate-400 uppercase mb-2 tracking-widest">Cover Source</label>
                            <div class="input-group">
                                <input type="text" id="track-img-${idx}" value="${album.img || ''}" oninput="updateTrackData(${idx}, 'img', this.value)" class="input-field-bare font-mono text-[10px] text-slate-500" placeholder="https://...">
                                <label class="file-upload-trigger">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                    UPLOAD
                                    <input type="file" class="hidden" accept="image/*" onchange="handleTrackFileAsBase64(this, ${idx})">
                                </label>
                            </div>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-[9px] font-black text-slate-400 uppercase mb-2 tracking-widest">Liner Notes</label>
                            <textarea oninput="updateTrackData(${idx}, 'desc', this.value)" class="input-field w-full p-3 bg-slate-50 border border-slate-100 rounded-xl font-medium min-h-[100px] focus:border-[#5F4B8B] outline-none transition-all leading-relaxed" placeholder="backstory...">${album.desc || ''}</textarea>
                        </div>
                    </div>`;
                container.appendChild(div);
            });
        };

        window.handleFileAsBase64 = (input, displayId, dataKey) => {
            const file = input.files[0]; if (!file) return;
            if (file.size > 1.2 * 1024 * 1024) { alert("파일이 너무 큽니다 (1MB 이하 권장)."); return; }
            const reader = new FileReader();
            reader.onload = (e) => {
                const base64Data = e.target.result;
                document.getElementById(displayId).value = base64Data;
                archiveData[selectedMonth][dataKey] = base64Data;
            };
            reader.readAsDataURL(file);
        };

        window.handleTrackFileAsBase64 = (input, idx) => {
            const file = input.files[0]; if (!file) return;
            if (file.size > 1024 * 1024) { alert("파일 용량을 줄여주세요 (1MB 이하 권장)."); return; }
            const reader = new FileReader();
            reader.onload = (e) => {
                const base64Data = e.target.result;
                document.getElementById(`track-img-${idx}`).value = base64Data;
                archiveData[selectedMonth].albums[idx].img = base64Data;
            };
            reader.readAsDataURL(file);
        };

        window.updateThemeData = (field, value) => { if (selectedMonth) archiveData[selectedMonth][field] = value; };
        window.updateTrackData = (idx, field, value) => { if (selectedMonth) archiveData[selectedMonth].albums[idx][field] = value; };
        window.removeTrack = (idx) => { if (confirm("삭제하시겠습니까?")) { archiveData[selectedMonth].albums.splice(idx, 1); renderTracks(archiveData[selectedMonth].albums); } };

        document.getElementById('add-track-btn').onclick = () => {
            if (!selectedMonth) return;
            if (!archiveData[selectedMonth].albums) archiveData[selectedMonth].albums = [];
            archiveData[selectedMonth].albums.push({ title: "", artist: "", img: "", desc: "" });
            renderTracks(archiveData[selectedMonth].albums);
        };

        document.getElementById('add-month-btn').onclick = () => {
            const nextMonth = prompt("새로운 호 입력 (예: 2026.05)");
            if (nextMonth && !archiveData[nextMonth]) {
                archiveData[nextMonth] = { theme: "새로운 테마", themeImg: "", intro: "", albums: [] };
                renderSidebar(); selectMonth(nextMonth);
            }
        };

        document.getElementById('save-btn').onclick = async () => {
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = '<span class="animate-pulse">Syncing...</span>';
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'archive', 'master'), archiveData);
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    alert("✨ 데이터베이스 동기화가 완료되었습니다.");
                }, 500);
            } catch (e) {
                alert("동기화 실패: " + e.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        init();
    </script>
</body>
</html>
